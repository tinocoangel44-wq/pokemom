<!-- Importar fuente estilo Pokémon -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
  
  .font-pokemon {
    font-family: 'Fredoka One', cursive;
  }
  
  .text-pokemon-title {
    color: #ffcb05;
    -webkit-text-stroke: 2px #3c5aa6;
    text-shadow: 4px 4px 0px #3c5aa6;
  }
</style>

<div class="min-h-screen w-screen flex items-center justify-center relative overflow-hidden font-pokemon"
     style="background-image: url('/pokeballs_wallpaper.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
  
  <!-- Overlay oscuro para mejorar contraste si es necesario -->
  <div class="absolute inset-0 bg-slate-900/30"></div>
  
  <!-- Contenedor Estilo Interfaz Consola -->
  <div class="relative z-10 w-full max-w-md bg-[#f0f0f0] border-4 border-slate-900 p-8 rounded-3xl shadow-[8px_8px_0_0_rgba(0,0,0,0.5)]">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl tracking-widest uppercase mb-2 text-pokemon-title">Pokémon TCG</h1>
      <p class="text-[#3c5aa6] text-lg">Portal de Batalla</p>
    </div>

    <!-- Pestañas (Tabs) -->
    <div class="flex mb-6 bg-slate-300 border-4 border-slate-900 rounded-xl p-1 shadow-[4px_4px_0_0_rgba(0,0,0,0.2)]">
      <button (click)="isLoginMode = true"
              class="flex-1 py-2 rounded-lg text-sm transition-all duration-300 uppercase"
              [ngClass]="isLoginMode ? 'bg-[#3c5aa6] text-[#ffcb05] border-2 border-[#1a2b56] shadow-inner' : 'text-slate-600 hover:text-slate-900'">
        INICIAR SESIÓN
      </button>
      <button (click)="isLoginMode = false"
              class="flex-1 py-2 rounded-lg text-sm transition-all duration-300 uppercase"
              [ngClass]="!isLoginMode ? 'bg-[#3c5aa6] text-[#ffcb05] border-2 border-[#1a2b56] shadow-inner' : 'text-slate-600 hover:text-slate-900'">
        REGISTRO
      </button>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      
      <!-- Mensaje de Error / Éxito -->
      <div *ngIf="errorMessage" class="bg-red-100 border-4 border-red-500 text-red-700 text-sm p-3 rounded-xl text-center animate-pulse">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="bg-green-100 border-4 border-green-500 text-green-700 text-sm p-3 rounded-xl text-center">
        {{ successMessage }}
      </div>

      <!-- Email -->
      <div class="flex flex-col">
        <label class="text-[#3c5aa6] text-sm mb-1 ml-1 uppercase">CORREO ELECTRÓNICO</label>
        <input type="email" [(ngModel)]="email" name="email" required
               class="w-full bg-white border-4 border-slate-900 text-slate-900 rounded-xl px-4 py-3 focus:outline-none focus:ring-4 focus:ring-[#ffcb05] transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]"
               placeholder="entrenador@pokemon.com" />
      </div>

      <!-- Contraseña -->
      <div class="flex flex-col">
        <label class="text-[#3c5aa6] text-sm mb-1 ml-1 uppercase">CONTRASEÑA</label>
        <input type="password" [(ngModel)]="password" name="password" required
               class="w-full bg-white border-4 border-slate-900 text-slate-900 rounded-xl px-4 py-3 focus:outline-none focus:ring-4 focus:ring-[#ffcb05] transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]"
               placeholder="••••••••" />
      </div>

      <!-- Botón Principal -->
      <button type="submit" [disabled]="isLoading"
              class="w-full mt-4 bg-[#3c5aa6] hover:bg-[#2a3f75] text-[#ffcb05] py-4 rounded-xl border-4 border-slate-900 shadow-[4px_4px_0_0_rgba(0,0,0,0.5)] hover:shadow-none hover:translate-y-1 transition-all duration-300 uppercase tracking-widest disabled:opacity-50 disabled:cursor-not-allowed">
        {{ isLoading ? 'PROCESANDO...' : (isLoginMode ? 'ENTRAR AL PORTAL' : 'CREAR CUENTA') }}
      </button>

    </form>
  </div>
</div>
