<!-- Renderizado Condicional de Componentes -->
<ng-container [ngSwitch]="currentScreen">
  
  <app-auth *ngSwitchCase="'auth'"
    (loginSuccess)="setScreen('portal')">
  </app-auth>

  <app-game-portal *ngSwitchCase="'portal'" 
    (startGame)="startMatch($event)"
    (openDeckBuilder)="setScreen('deckBuilder')"
    (openCollection)="setScreen('collection')"
    (openHistory)="setScreen('history')"
    (openRules)="showRules = true">
  </app-game-portal>
  
  <app-game-board *ngSwitchCase="'game'" 
    [gameState]="gameState" 
    [currentPlayerId]="player.id"
    [isMultiplayer]="isMultiplayer"
    [isHost]="isHost"
    (onAction)="onGameAction($event)">
  </app-game-board>

  <app-deck-builder *ngSwitchCase="'deckBuilder'"
    (onClose)="setScreen('portal')">
  </app-deck-builder>

  <app-deck-builder *ngSwitchCase="'collection'"
    [isCollectionMode]="true"
    (onClose)="setScreen('portal')">
  </app-deck-builder>

  <app-history *ngSwitchCase="'history'"
    (onClose)="setScreen('portal')">
  </app-history>

  <app-match-result *ngSwitchCase="'results'"
    [resultData]="matchResultData"
    (onClose)="setScreen('portal')">
  </app-match-result>

  <app-lobby *ngSwitchCase="'lobby'"
    (onClose)="setScreen('portal')">
  </app-lobby>

</ng-container>

<app-rules *ngIf="showRules" (onClose)="showRules = false"></app-rules>
